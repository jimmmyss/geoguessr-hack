<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 200px; padding: 15px; font-family: sans-serif; background-color: #222; color: white;}
        h3 { margin-top: 0; font-size: 16px; color: #4CAF50;}
        .coords { font-weight: bold; background: #333; padding: 10px; border-radius: 5px; margin-bottom: 15px; font-family: monospace; font-size: 13px;}
        button { 
            width: 100%; 
            padding: 10px; 
            cursor: pointer; 
            background: #4CAF50; 
            border: none; 
            color: white; 
            font-weight: bold; 
            border-radius: 4px;
        }
        button:hover { background: #45a049; }
    </style>
</head>
<body>
    <h3>GeoGuessr Extractor</h3>
    <div id="status" style="font-size: 12px; margin-bottom: 8px; color: #aaa;">Waiting for coordinates...</div>
    <div class="coords" id="coords">Lat: --<br>Lng: --</div>
    <button id="placePin">Place Pin on Map</button>
    <script src="popup.js"></script>
</body>
</html>
